<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Data | InitMAPAfish</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        ocean: {
                            900: '#020617',
                            800: '#09122C',
                            700: '#111E3E',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-ocean-900 text-slate-300 min-h-screen selection:bg-emerald-500/30 overflow-x-hidden relative">

    <!-- Background Effects -->
    <div class="fixed inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-emerald-900/10 via-ocean-900 to-ocean-900 pointer-events-none"></div>
    
    <!-- Navigation -->
    <nav id="main-nav" class="sticky top-0 z-50 bg-ocean-900/70 backdrop-blur-xl border-b border-white/5 py-4 px-6 shadow-2xl">
        <!-- Injected via components.js -->
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-16">
        <!-- Header -->
        <header class="mb-12 animate-fade-in text-center">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-full text-[10px] font-black uppercase tracking-widest mb-6">
                <i data-lucide="shield-check" class="w-4 h-4"></i>
                Authorized Researcher Portal
            </div>
            <h2 class="text-4xl md:text-5xl font-outfit font-black text-white mb-4 leading-tight">
                Submit New Genomic Sample
            </h2>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto">
                Fill out the metadata below to index your research in the InitMAPAfish repository.
            </p>
        </header>

        <!-- Submission Form -->
        <div class="bg-ocean-800/40 backdrop-blur-xl rounded-[2.5rem] border border-white/5 p-8 md:p-12 shadow-2xl relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/[0.02] to-transparent pointer-events-none"></div>
            
            <form id="submission-form" class="relative z-10 grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Identification -->
                <div class="md:col-span-2 flex items-center gap-3 pb-2 border-b border-white/5 mb-2">
                    <i data-lucide="tag" class="text-emerald-400 w-5 h-5"></i>
                    <h3 class="text-lg font-outfit font-bold text-white">Identification</h3>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Sample Label</label>
                    <input type="text" placeholder="e.g. SA_ROB_024" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:border-emerald-500/50 transition-all font-medium">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Target Species</label>
                    <select class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500/50 transition-all appearance-none cursor-pointer">
                        <option value="">Select Species...</option>
                        <option value="Dourada">Dourada (Sparus aurata)</option>
                        <option value="Robalo">Robalo (Dicentrarchus labrax)</option>
                        <option value="Pregado">Pregado (Scophthalmus maximus)</option>
                        <option value="Sargo">Sargo (Diplodus sargus)</option>
                    </select>
                </div>

                <!-- Secondary Metadata -->
                <div class="md:col-span-2 flex items-center gap-3 pb-2 border-b border-white/5 mb-2 mt-4">
                    <i data-lucide="microscope" class="text-emerald-400 w-5 h-5"></i>
                    <h3 class="text-lg font-outfit font-bold text-white">Laboratory Metadata</h3>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Tissue Type</label>
                    <select class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500/50 transition-all appearance-none cursor-pointer">
                        <option value="Gills">Gills</option>
                        <option value="Skin">Skin</option>
                        <option value="Intestinal Tissue">Intestinal Tissue</option>
                        <option value="Muscle">Muscle</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Project Name</label>
                    <input type="text" placeholder="e.g. Atlantic Fish Microbiome" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:border-emerald-500/50 transition-all font-medium">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Raw Reads</label>
                    <input type="number" placeholder="0" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:border-emerald-500/50 transition-all font-mono">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Relative Abundance (%)</label>
                    <input type="number" step="0.01" placeholder="0.00" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 focus:outline-none focus:border-emerald-500/50 transition-all font-mono">
                </div>

                <!-- Submit Button -->
                <div class="md:col-span-2 pt-8">
                    <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-ocean-900 font-black py-4 rounded-2xl shadow-[0_10px_30px_rgba(16,185,129,0.3)] hover:shadow-[0_10px_40px_rgba(16,185,129,0.5)] transform hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center gap-3 text-lg uppercase tracking-widest">
                        <i data-lucide="check-circle-2" class="w-6 h-6"></i>
                        Register to Wikibase
                    </button>
                    <p class="text-center text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-6 opacity-60">
                        Secure Submission Tool • CIIMAR Laboratory Nodes • 2026
                    </p>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/components.js"></script>
    <script>
        lucide.createIcons();
        
        document.getElementById('submission-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('This is a demonstration! In a production environment, this would securely push data to your Wikibase Cloud instance via API.');
        });
    </script>
</body>
</html>
